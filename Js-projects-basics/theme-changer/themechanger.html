<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="themechanger.css">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=light_mode" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

</head>

<body class="light">

    <div class="container">
        <h1>THEME CHANGER</h1>
        <label class="toggle">
            <input type="checkbox" id="themeToggle" />
            <span class="slider">
                <span class="material-symbols-outlined icon sun">
                    light_mode
                </span>
                <span class="material-symbols-outlined icon moon">
                    dark_mode
                </span>
            </span>
        </label>
    </div>

</body>
<script src="./script.js"></script>

</html>
