<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Background Changer</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <div class="container">
    <div class="color-box">
      <h2>Pastel Pink</h2>
      <p>Gentle warmth and soft aesthetics with rosy vibes.</p>
      <button class="blob-btn pastel-pink" id="ca8c93">Pink</button>
    </div>

    <div class="color-box">
      <h2>Pastel Green</h2>
      <p>Refreshing and calming tones, perfect for UI balance.</p>
      <button class="blob-btn pastel-green" id="5bb189">Green</button>
    </div>

    <div class="color-box">
      <h2>Pastel Blue</h2>
      <p>Peaceful and cool tones that relax the eye.</p>
      <button class="blob-btn pastel-blue" id="6e97b6">Blue</button>
    </div>

    <div class="color-box">
      <h2>Pastel Yellow</h2>
      <p>Bright and cheerful to energize your layout.</p>
      <button class="blob-btn pastel-yellow" id="cbbd6d">Yellow</button>
    </div>
  </div>

</body>
<script src="./script.js"></script>
</html>
